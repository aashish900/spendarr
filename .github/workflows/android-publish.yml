# Build and publish the spendarr Android APK + AAB to a GitHub Release when a
# version tag is pushed. Mirrors heerr's android-publish.yml.
#
# Trigger: push to any tag matching v* (e.g. git tag v0.1.0 && git push --tags)
#
# Pipeline:
#   1. Set up Java 17 + Flutter 3.44.0
#   2. Install Dart deps
#   3. Decode keystore, write key.properties
#   4. flutter build apk --release
#   5. flutter build appbundle --release (the .aab Play Store requires for submission)
#   6. Rename both to spendarr-<tag>.apk / spendarr-<tag>.aab and attach them to a
#      GitHub Release. The APK stays for direct-install/sideload distribution; the
#      AAB is what gets uploaded to the Play Console.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#
#   ANDROID_KEYSTORE_BASE64  — base64-encoded keystore.jks, encoded WITHOUT line breaks:
#                                base64 -i android/app/android/keystore.jks | tr -d '\n' | pbcopy
#                              then paste as the secret value.
#
#   ANDROID_KEY_ALIAS        — spendarr
#
#   ANDROID_KEY_PASSWORD     — key password (same as store password if you pressed Enter
#                              at the keytool prompt)
#
#   ANDROID_STORE_PASSWORD   — keystore / store password
#
# See android/app/README.md "Building a release APK" for how to generate the
# keystore locally — this workflow does not generate one, only consumes it.
#
# APK is signed with the same keystore as local release builds. Losing the
# keystore or passwords means you cannot deliver an update to an existing
# install — you would have to uninstall (wiping secure storage) and reinstall.

name: Publish Android APK + AAB

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # required to create GitHub Releases and upload assets

jobs:
  android:
    name: build + release APK + AAB
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: android/app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter 3.44.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: printf '%s' "${KEYSTORE_BASE64}" | base64 --decode > android/keystore.jks

      - name: Write key.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${STORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=keystore.jks
          EOF

      # Bakes the release tag into the APK's versionName (and a monotonic
      # versionCode from the run number) so the built artifact's version
      # matches the tag it shipped as, not whatever pubspec `version:` says.
      - name: Build release APK
        run: |
          flutter build apk --release \
            --build-name="${GITHUB_REF_NAME#v}" \
            --build-number="${{ github.run_number }}"

      - name: Rename APK (embed version in filename)
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/spendarr-${{ github.ref_name }}.apk

      # Same signing config (key.properties) as the APK build above — the AAB
      # must be signed with the same upload key already registered with Play.
      - name: Build release AAB
        run: |
          flutter build appbundle --release \
            --build-name="${GITHUB_REF_NAME#v}" \
            --build-number="${{ github.run_number }}"

      - name: Rename AAB (embed version in filename)
        run: |
          mv build/app/outputs/bundle/release/app-release.aab \
             build/app/outputs/bundle/release/spendarr-${{ github.ref_name }}.aab

      - name: Create GitHub Release and attach APK + AAB
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            android/app/build/app/outputs/flutter-apk/spendarr-${{ github.ref_name }}.apk
            android/app/build/app/outputs/bundle/release/spendarr-${{ github.ref_name }}.aab
